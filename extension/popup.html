<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wish Cookie Sender</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; width: 320px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #ff7eb9; color: white; cursor: pointer; font-size: 16px; box-shadow: 0 6px 16px rgba(255, 126, 185, 0.25); }
    button:hover:not(:disabled) { background: #ff6ab1; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 14px; font-size: 14px; color: #3a2f5f; }
    .hint { margin-top: 10px; font-size: 12px; color: #7b6f92; }
  </style>
</head>
<body>
  <h1>Birthday Wisher</h1>
  <button id="sendButton">Send a wish</button>
  <div class="status" id="status">Ready to make someone's day.</div>
  <div class="hint">Open the popup and press the button to send your wish.</div>

  <script src="popup.js"></script>
</body>
</html>
